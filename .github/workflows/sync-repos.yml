name: Sync GitHub Repositories

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Export repositories to data/repos.json
        env:
          GITHUB_TOKEN: ${{ secrets.PRIVATE_REPOS_TOKEN }}
          GITHUB_USERNAME: lnavarroto
        run: node scripts/export-repos.mjs

      - name: Commit updated repos.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/repos.json
          git diff --staged --quiet && exit 0
          git commit -m "chore: sync repositories for portfolio"
          git push
