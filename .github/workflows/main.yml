name: Sync GitHub Repositories

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Export repos
        env:
          GITHUB_TOKEN: ${{ secrets.PRIVATE_REPOS_TOKEN }}
          GITHUB_USERNAME: lnavarroto
        run: node scripts/export-repos.mjs

      - name: Commit data/repos.json
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/repos.json
          git commit -m "sync repos data" || echo "no changes"
          git push
